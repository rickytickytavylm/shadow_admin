<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#f5f5f7">
  <title>ТЕНЬ · Админ-панель</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TENI">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260711f">
</head>
<body>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <!-- Экран входа -->
  <section id="login-screen" class="login-screen">
    <form id="login-form" class="login-card glass" autocomplete="off">
      <span class="brand-kicker">Танцевальный чемпионат по пилону</span>
      <div class="brand-logo">ЧЕМПИОНАТ <span class="brand-sep">|</span> ТЕНЬ</div>
      <h1>Админ-панель</h1>
      <p class="login-hint">Введите токен доступа, чтобы открыть заявки и чаты.</p>
      <input id="token-input" class="field" type="password" placeholder="Токен доступа" required
             autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false" inputmode="text">
      <button type="submit" class="btn btn-primary">Войти</button>
      <p id="login-error" class="login-error" hidden></p>
    </form>
  </section>

  <!-- Приложение -->
  <div id="app" class="app" hidden>

    <!-- ЗАЯВКИ -->
    <section id="view-apps" class="view">
      <div class="toolbar">
        <input id="apps-search" class="field field--search" type="search" placeholder="Поиск: имя, email, телефон, город…">
        <select id="category-filter" class="field field--select" aria-label="Категория">
          <option value="">Все категории</option>
        </select>
        <select id="status-filter" class="field field--select" aria-label="Статус">
          <option value="">Все статусы</option>
          <option value="awaiting_payment">Не оплачено</option>
          <option value="paid">Оплачено</option>
          <option value="new">Новая</option>
          <option value="reviewing">На рассмотрении</option>
          <option value="accepted">Прошёл отбор</option>
          <option value="rejected">Отклонена</option>
        </select>
      </div>
      <div id="apps-grid" class="apps-grid"></div>
      <p id="apps-empty" class="empty-state" hidden>Заявок пока нет.</p>
    </section>

    <!-- ЧАТЫ -->
    <section id="view-chats" class="view" hidden>
      <div class="toolbar">
        <input id="chats-search" class="field field--search" type="search" placeholder="Поиск по тексту диалога или device id…">
      </div>
      <div id="chats-list" class="chats-list"></div>
      <p id="chats-empty" class="empty-state" hidden>Диалогов с ИИ пока нет.</p>
    </section>

    <!-- Нижняя навигация -->
    <nav class="tabbar" aria-label="Навигация">
      <button class="tabbar-btn is-active" data-tab="apps" type="button">
        <span class="tabbar-icon-wrap">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
          <span class="tabbar-badge" id="tab-apps-count">0</span>
        </span>
        <span>Заявки</span>
      </button>
      <button class="tabbar-btn" data-tab="chats" type="button">
        <span class="tabbar-icon-wrap">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 20l1-4.4A8 8 0 1 1 21 12z"/></svg>
          <span class="tabbar-badge" id="tab-chats-count">0</span>
        </span>
        <span>Чаты</span>
      </button>
      <button class="tabbar-btn" id="tabbar-refresh" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-.5 4"/><path d="M20 4v6h-6"/></svg>
        <span>Обновить</span>
      </button>
      <button class="tabbar-btn" id="tabbar-settings" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Настройки</span>
      </button>
    </nav>
  </div>

  <!-- Выдвижная панель деталей -->
  <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>
  <aside id="drawer" class="drawer glass" hidden aria-hidden="true">
    <div class="drawer-grabber" aria-hidden="true"></div>
    <button id="drawer-close" class="drawer-close" type="button" aria-label="Закрыть">&times;</button>
    <div id="drawer-body" class="drawer-body"></div>
  </aside>

  <!-- Apple-style подтверждение -->
  <div id="alert-backdrop" class="alert-backdrop" hidden></div>
  <div id="alert" class="alert" hidden role="alertdialog" aria-modal="true" aria-labelledby="alert-title" aria-describedby="alert-message">
    <div class="alert-card">
      <h3 class="alert-title" id="alert-title"></h3>
      <p class="alert-message" id="alert-message"></p>
      <div class="alert-actions">
        <button type="button" class="alert-btn alert-btn--cancel" id="alert-cancel">Отмена</button>
        <button type="button" class="alert-btn alert-btn--ok" id="alert-ok" aria-label="Подтвердить">
          <span class="alert-ok-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- Всплывающее уведомление -->
  <div id="toast" class="toast" hidden aria-live="polite"></div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
      let swRefreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (swRefreshing) return;
        swRefreshing = true;
        window.location.reload();
      });
    }
  </script>
  <script src="config.js?v=20260711f"></script>
  <script src="app.js?v=20260711f"></script>
</body>
</html>
